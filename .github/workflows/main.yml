name: Build and Deploy Jekyll Blog from Issues

on:
  issues:
    types: [opened, edited, closed, labeled, unlabeled]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pages: write
      id-token: write

    steps:
      # Step 1: Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Create post files from issues
      - name: Create Posts from Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _posts
          gh issue list --label "blog" --json number,title,body,createdAt --jq . > issues.json
          node .github/scripts/generate-posts.js

      # Step 3: Build and deploy Jekyll site
      - name: Build and Deploy
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
