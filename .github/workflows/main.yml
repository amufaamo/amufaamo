name: Build and Deploy Blog

on:
  issues:
    types: [opened, edited, closed]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write
    steps:
      # ① リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # ② Issueからブログをビルド（★ここを修正しました！）
      - name: Build Blog
        uses: yiliang114/issue-blog-action@v3 # 新しいアクションを指定
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          labels: 'blog'
          sort-by: 'created-desc'

      # ③ ビルドしたサイトをGitHub Pagesにデプロイ
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

