name: Build and Deploy Jekyll Blog from Issues

on:
  issues:
    types: [opened, edited, closed, labeled, unlabeled]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み（投稿ファイルの作成）
      issues: read   # Issueの読み込み
      pages: write   # GitHub Pagesへのデプロイ
      id-token: write # デプロイ時の認証

    steps:
      # 1. リポジトリのコード（_config.ymlなど）をチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. IssueをJekyllの投稿ファイルに変換
      - name: Sync Issues to Posts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 投稿ファイルを保存するディレクトリを作成
          mkdir -p _posts

          # 'blog'ラベルのついたIssueをJSON形式で取得
          gh issue list --label "blog" --json number,title,body,createdAt --jq . > issues.json

          # Node.jsでIssueをMarkdownファイルに変換
          node -e '
            const fs = require("fs");
            const issues = JSON.parse(fs.readFileSync("issues.json"));

            for (const issue of issues) {
              const date = new Date(issue.createdAt);
              const yyyy = date.getFullYear();
              const mm = String(date.getMonth() + 1).padStart(2, "0");
              const dd = String(date.getDate()).padStart(2, "0");
              
              // ファイル名を "2025-07-02-issue-15.md" のような形式に
              const fileName = `${yyyy}-${mm}-${dd}-issue-${issue.number}.md`;
              
              // Jekyllの投稿ファイルに必要な「Front Matter」
              const fileContent = `---
layout: post
title: "${issue.title.replace(/"/g, '\\"')}"
date: ${issue.createdAt}
---

${issue.body}
`;
              fs.writeFileSync(`_posts/${fileName}`, fileContent);
              console.log(`Generated: ${fileName}`);
            }
          '
      
      # 3. Jekyllサイトをビルドしてデプロイ
      - name: Build and Deploy
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
