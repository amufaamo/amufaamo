name: Build and Deploy Blog

on:
  issues:
    types: [opened, edited, closed]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: write
    steps:
      # ① リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # ② Issueからブログをビルド（★ここを再度修正しました！）
      - name: Build Blog
        uses: actions-cool/issues-blog-action@v3 # 新しいアクションを指定
        with:
          # このアクションは GITHUB_TOKEN がデフォルトなので、行自体が不要です
          labels: 'blog'

      # ③ ビルドしたサイトをGitHub Pagesにデプロイ
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # このアクションも出力先は 'dist' ディレクトリです
          publish_dir: ./dist
